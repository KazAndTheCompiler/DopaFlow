[tool.ruff]
line-length = 88

[tool.ruff.lint]
select = [
  "E",     # pycodestyle errors
  "W",     # pycodestyle warnings
  "F",     # pyflakes
  "I",     # isort
  "UP",    # pyupgrade
  "B",     # flake8-bugbear
  "C4",    # flake8-comprehensions
  "SIM",   # flake8-simplify
  "TCH",   # flake8-type-checking
  "RUF",   # ruff-specific rules
]
ignore = [
  "E501",   # line too long (handled by formatter)
  "SIM108", # use ternary (readability)
  "TCH001", # type-checking import in wrong block (conditional import is intentional)
  "TCH003", # type-checking import in wrong block
  "TC002",  # move third-party import to type-checking block — requires restructuring
  "TC004",  # move import to type-checking block — requires restructuring
  "TC006",  # move import to type-checking block — requires restructuring
  "B008",   # Depends() in argument defaults — standard FastAPI DI pattern
  "B904",   # raise without from — stylistic in many existing except blocks
  "RUF047", # await in non-async scope — false positive for FastAPI middleware
  "RUF046", # unnecessary int cast — stylistic
  "RUF059", # unpacked variable unused — stylistic
  "RUF007", # prefer itertools.pairwise — stylistic upgrade
  "B905",   # zip without strict= — not a bug for our length-matched usage
  "SIM102", # nested if statements — stylistic, widely used in codebase
  "SIM105", # try-except-pass — stylistic
  "SIM115", # use context manager — stylistic, widely used
  "SIM117", # combine with-elif — stylistic
  "RUF012", # mutable class default — stylistic, widely used
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["TCH", "TC", "E402", "F841"]
"__init__.py" = ["F401"]
"app/core/config.py" = ["TCH", "TC"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
