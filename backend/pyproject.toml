[lint]
select = [
  "E",     # pycodestyle errors
  "W",     # pycodestyle warnings
  "F",     # pyflakes
  "I",     # isort
  "UP",    # pyupgrade
  "B",     # flake8-bugbear
  "C4",    # flake8-comprehensions
  "SIM",   # flake8-simplify
  "TCH",   # flake8-type-checking
  "RUF",   # ruff-specific rules
]
ignore = [
  "E501",   # line too long (handled by formatter)
  "SIM108", # use ternary (readability)
  "TCH001", # type-checking import in wrong block (conditional import is intentional)
  "TCH003", # type-checking import in wrong block
]

[lint per-file-ignores]
"tests/*" = ["TCH"]
"__init__.py" = ["F401"]
"app/core/config.py" = ["TCH"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
