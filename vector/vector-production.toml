# bulk.index = "{{ service }}-{{ level }}-%Y.%m.%d"

# Sink: Error alerting (filter for errors and above)
[transforms.error_filter]
type = "filter"
inputs = ["categorize"]
condition = '.severity >= 5'

[sinks.error_webhook]
type = "http"
inputs = ["error_filter"]
uri = "${ERROR_WEBHOOK_URL}"
encoding.codec = "json"
method = "POST"

[sinks.error_webhook.buffer]
type = "memory"
max_events = 100
when_full = "drop_newest"

[sinks.error_webhook.request]
retry_attempts = 3

# Metrics: Generate metrics from logs
[transforms.log_metrics]
type = "log_to_metric"
inputs = ["categorize"]

[[transforms.log_metrics.metrics]]
type = "counter"
field = "message"
name = "log_lines_total"
tags.service = "{{ service }}"
tags.level = "{{ level }}"
tags.environment = "{{ environment }}"

[[transforms.log_metrics.metrics]]
type = "counter"
field = "message"
name = "log_bytes_total"
tags.service = "{{ service }}"

[[transforms.log_metrics.metrics]]
type = "gauge"
field = "severity"
name = "log_severity_current"
tags.service = "{{ service }}"

# Sink: Prometheus metrics
[sinks.prometheus]
type = "prometheus_exporter"
inputs = ["log_metrics"]
address = "0.0.0.0:9598"

# Health check endpoint
[sources.vector_metrics]
type = "internal_metrics"

[sinks.vector_metrics_prometheus]
type = "prometheus_exporter"
inputs = ["vector_metrics"]
address = "0.0.0.0:9599"
