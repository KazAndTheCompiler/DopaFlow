version: "3.9"

services:
  backend-staging:
    image: dopaflow-backend:latest
    container_name: dopaflow-backend-staging
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      - DOPAFLOW_DB_PATH=/data/dopaflow_staging.db
      - DOPAFLOW_PRODUCTION=true
      - DOPAFLOW_ENFORCE_AUTH=true
      - DOPAFLOW_API_KEY=${DOPAFLOW_API_KEY:-}
      - DOPAFLOW_AUTH_TOKEN_SECRET=${DOPAFLOW_AUTH_TOKEN_SECRET:-}
      - DOPAFLOW_BASE_URL=http://localhost:8001
      - DOPAFLOW_DISABLE_BACKGROUND_JOBS=true
      - DOPAFLOW_DISABLE_LOCAL_AUDIO=true
    volumes:
      - dopaflow-staging-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - dopaflow-staging

  frontend-staging:
    image: dopaflow-frontend:latest
    container_name: dopaflow-frontend-staging
    restart: unless-stopped
    ports:
      - "3001:80"
    environment:
      - DOPAFLOW_API_KEY=${DOPAFLOW_API_KEY:-}
    volumes:
      - dopaflow-staging-data:/data
    depends_on:
      - backend-staging
    networks:
      - dopaflow-staging

volumes:
  dopaflow-staging-data:
    name: dopaflow-staging-data

networks:
  dopaflow-staging:
    name: dopaflow-staging
