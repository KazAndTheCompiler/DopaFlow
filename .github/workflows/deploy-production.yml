name: Deploy to Production

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to deploy (e.g., v2.1.0)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/kazandthecompiler/dopaflow-backend
  FRONTEND_IMAGE: ghcr.io/kazandthecompiler/dopaflow-frontend

jobs:
  build-and-push:
    name: Build and Push Production Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          VERSION=${{ github.event.inputs.tag || github.ref_name }}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-production:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://dopaflow.app
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Create deployment record
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ github.event.inputs.tag || github.ref_name }}
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/deployments \
            -f ref=$VERSION \
            -f environment=production \
            -f auto_merge=false \
            -f required_contexts[]=Backend\ CI \
            -f required_contexts[]=Frontend\ CI

      - name: Deploy to production server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $PRODUCTION_HOST >> ~/.ssh/known_hosts
          
          # Copy deployment files
          scp -i ~/.ssh/deploy_key docker-compose.production.yml $PRODUCTION_USER@$PRODUCTION_HOST:/opt/dopaflow/
          scp -i ~/.ssh/deploy_key .env.production $PRODUCTION_USER@$PRODUCTION_HOST:/opt/dopaflow/.env
          
          # Deploy with zero-downtime
          ssh -i ~/.ssh/deploy_key $PRODUCTION_USER@$PRODUCTION_HOST << 'EOF'
            cd /opt/dopaflow
            
            # Pull new images
            docker-compose -f docker-compose.production.yml pull
            
            # Run migrations before switching traffic
            docker-compose -f docker-compose.production.yml run --rm backend alembic upgrade head
            
            # Rolling update
            docker-compose -f docker-compose.production.yml up -d --no-deps --scale backend=2 backend
            sleep 10
            
            # Verify health
            curl -sf http://localhost:8000/api/v2/health/ready || exit 1
            
            # Scale back down
            docker-compose -f docker-compose.production.yml up -d --scale backend=1 backend
            
            # Cleanup
            docker system prune -f
          EOF

      - name: Verify production deployment
        run: |
          sleep 15
          curl -sf https://dopaflow.app/api/v2/health/ready || exit 1
          echo "Production deployment verified successfully"

      - name: Update deployment status
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ github.event.inputs.tag || github.ref_name }}
          STATUS=$([[ "${{ job.status }}" == "success" ]] && echo "success" || echo "failure")
          
          # Get deployment ID
          DEPLOYMENT_ID=$(gh api \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/deployments \
            -q ".[] | select(.ref==\"$VERSION\" and .environment==\"production\") | .id" | head -1)
          
          if [ -n "$DEPLOYMENT_ID" ]; then
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              /repos/${{ github.repository }}/deployments/$DEPLOYMENT_ID/statuses \
              -f state=$STATUS
          fi

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚨 Production deployment failed for DopaFlow ${{ github.event.inputs.tag || github.ref_name }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "Production Deployment Failed"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Version:*\n${{ github.event.inputs.tag || github.ref_name }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
