name: Repo Hygiene

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  repo-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check repo hygiene
        run: python scripts/check_repo_hygiene.py
