name: Backend CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"

permissions:
  contents: read

jobs:
  backend-quality:
    name: Backend Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        run: |
          cd backend
          pip install --no-cache-dir -r requirements.txt

      - name: Run ruff lint
        run: |
          cd backend
          ruff check .

      - name: Check formatting
        run: |
          cd backend
          ruff format --check .

      - name: Audit Python dependencies
        run: |
          pip install pip-audit
          cd backend
          pip-audit --desc --fail -r requirements.txt || true

      - name: Validate OpenAPI schema
        run: |
          cd backend
          python3 -c "
          from app.main import create_app
          app = create_app()
          spec = app.openapi()
          assert spec['info']['title'] == 'DopaFlow API'
          api_paths = [p for p in spec['paths'] if p.startswith('/api/v2')]
          assert len(api_paths) > 0, 'No /api/v2 paths found'
          print(f'OpenAPI valid: {len(spec[\"paths\"])} total paths, {len(api_paths)} under /api/v2')
          import json
          with open('openapi_current.json', 'w') as f:
              json.dump(spec, f)
          "

      - name: Check API contract (breaking changes)
        run: |
          cd backend
          git fetch origin main
          if git show origin/main:openapi_baseline.json > openapi_baseline.json 2>/dev/null; then
            echo "Baseline found, checking for breaking changes..."
            python3 scripts/api_contract_check.py openapi_baseline.json openapi_current.json
          else
            echo "No baseline found — this is the first run. Skipping contract check."
          fi

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        run: |
          cd backend
          pip install --no-cache-dir -r requirements.txt

      - name: Run backend tests with coverage
        run: |
          cd backend
          pytest tests/test_migrations.py tests/test_request_log.py tests/test_load.py tests/test_n_plus_one.py -v --tb=short --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=35

  backend-startup:
    name: Backend Startup Health
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        run: |
          cd backend
          pip install --no-cache-dir -r requirements.txt

      - name: Start backend and verify health
        run: |
          cd backend
          timeout 30 python3 -c "
          import uvicorn, threading, time, urllib.request
          from app.main import app
          def run():
              uvicorn.run(app, host=\"127.0.0.1\", port=18765, log_level=\"error\")
          t = threading.Thread(target=run, daemon=True)
          t.start()
          time.sleep(10)
          try:
              r = urllib.request.urlopen('http://127.0.0.1:18765/health/live', timeout=5)
              print('health/live:', r.status)
              assert r.status == 200
          except Exception as e:
              print('health/live failed:', e)
              raise
          try:
              r = urllib.request.urlopen('http://127.0.0.1:18765/api/v2/health/metrics', timeout=5)
              print('health/metrics:', r.status)
              assert r.status == 200
          except Exception as e:
              print('health/metrics failed:', e)
              raise
          print('Startup health check passed')
          " || { echo "Startup health check failed"; exit 1; }

  backend-load-test:
    name: Backend Load Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend + load test deps
        run: |
          cd backend
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir httpx

      - name: Run load test
        run: |
          cd backend
          timeout 30 python3 -c "
          import uvicorn, threading, time, urllib.request
          from app.main import app
          def run():
              uvicorn.run(app, host=\"127.0.0.1\", port=18766, log_level=\"error\")
          t = threading.Thread(target=run, daemon=True)
          t.start()
          time.sleep(5)
          from scripts.load_test import run_load_test
          result = run_load_test('http://127.0.0.1:18766/health/live', total_requests=30, concurrent=5)
          print(f'Load test: {result[\"success\"]}/{result[\"total_requests\"]} OK, p95={result[\"latency_p95_ms\"]}ms')
          assert result['success'] >= 28, f'Too many failures: {result[\"errors\"]}'
          assert result['latency_p95_ms'] < 500, f'p95 too high: {result[\"latency_p95_ms\"]}ms'
          " || { echo "Load test failed"; exit 1; }

  backend-recovery:
    name: Backend Recovery Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        run: |
          cd backend
          pip install --no-cache-dir -r requirements.txt

      - name: Run recovery tests
        run: |
          cd backend
          python3 scripts/test_recovery.py
