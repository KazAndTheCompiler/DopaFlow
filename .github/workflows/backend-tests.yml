name: Backend CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"

permissions:
  contents: read

jobs:
  backend-quality:
    name: Backend Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run ruff lint
        run: |
          cd backend
          ruff check .

      - name: Check formatting
        run: |
          cd backend
          ruff format --check .

      - name: Audit Python dependencies
        run: |
          pip install pip-audit
          cd backend
          pip-audit --desc --fail -r requirements.txt || true

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run backend tests with coverage
        run: |
          cd backend
          pytest tests/test_migrations.py tests/test_request_log.py tests/test_load.py tests/test_n_plus_one.py -v --tb=short --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=35
