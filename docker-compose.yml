version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: dopaflow-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DOPAFLOW_DB_PATH=/data/dopaflow.db
      - DOPAFLOW_BASE_URL=http://localhost:8000
      - DOPAFLOW_DEV_AUTH=false
      - DOPAFLOW_ENFORCE_AUTH=true
      - DOPAFLOW_DISABLE_BACKGROUND_JOBS=false
      - DOPAFLOW_ALLOW_LOCAL_WEBHOOK_TARGETS=false
      - DOPAFLOW_DISABLE_LOCAL_AUDIO=false
    volumes:
      - dopaflow-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - dopaflow

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: dopaflow-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - VITE_API_URL=/api/v2
    networks:
      - dopaflow

networks:
  dopaflow:
    driver: bridge

volumes:
  dopaflow-data:
    driver: local
